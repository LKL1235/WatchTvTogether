name: CD

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release-backend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Build linux/amd64 (x86_64) backend
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
          # Baseline x86-64 to match "linux x86_64" servers without AVX, etc.
          GOAMD64: "v1"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/watchtogether-linux-amd64 ./cmd/server

      - name: Package release asset
        run: |
          tar -C dist -czf dist/watchtogether-linux-amd64.tar.gz watchtogether-linux-amd64
          sha256sum dist/watchtogether-linux-amd64.tar.gz > dist/watchtogether-linux-amd64.tar.gz.sha256

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/watchtogether-linux-amd64.tar.gz
            dist/watchtogether-linux-amd64.tar.gz.sha256

  docker:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve OCI image names (lowercase; GHCR requires owner/repo in lower case)
        id: oci
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          {
            echo "images<<__IMAGES__"
            echo "ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
            if [ -n "$DOCKERHUB_USER" ]; then
              echo "docker.io/${DOCKERHUB_USER}/watchtogether" | tr '[:upper:]' '[:lower:]'
            fi
            echo "__IMAGES__"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.oci.outputs.images }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          # Match release binary target: linux x86_64 (amd64) only
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
