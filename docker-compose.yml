version: "3.9"

# ─── 生产环境 Docker Compose ───────────────────────────────────────────────────
# 包含：PostgreSQL 15 + Redis 7 + WatchTogether 应用
#
# 快速启动：
#   1. cp .env.example .env  # 修改密码等敏感配置
#   2. docker compose up -d
#   3. docker compose logs -f app

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watchtogether}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-watchtogether}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchtogether}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── WatchTogether App ────────────────────────────────────────────────────────
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-owner/watchtogether}:${IMAGE_TAG:-latest}
    # 本地开发时使用构建产物，生产直接使用上面的镜像；
    # 若需本地构建，取消注释下面两行并注释掉上面的 image 行：
    # build:
    #   context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 存储与缓存后端
      STORAGE_BACKEND: postgres
      CACHE_BACKEND: redis
      # 数据库
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-watchtogether}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-watchtogether}?sslmode=disable"
      # Redis
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      # JWT
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}
      # OAuth（可选，不设置则禁用对应 Provider）
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      # 文件存储
      STORAGE_DIR: /data/videos
      # 服务地址
      ADDR: ":8080"
    volumes:
      - app_data:/data
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  app_data:

networks:
  backend:
    internal: true   # PostgreSQL / Redis 不对外暴露
  frontend:
